<style>

body{

.fullscreen-overlay,

.close-btn{

#menuBtn.hide-on-scroll{

.card{

.desc-block p{

}

#loadingScreen{

.loader{

 height:60px;
 border:5px solid rgba(255,255,255,.25);

 border-radius:50%;
 animation:spin 1s linear infinite;
}

.loading-text{
 margin-top:15px;

 font-weight:600;
 font-size:16px;
 letter-spacing:.5px;
}

@keyframes spin{
 from{
  transform:rotate(0deg);
 }
 to{
  transform:rotate(360deg);
 }
}

#loadingScreen.hide{
 opacity:0;
 pointer-events:none;
}

*{
   -webkit-tap-highlight-color: transparent;
   box-sizing:border-box;

button,
a,
input,
textarea{

<script>

let currentIndex=0;

function openFullscreen(index){
 currentIndex = index;

 document.getElementById("menuBtn").style.display = "none";

 const item = window.mediaItems[index];

 if(item.type === "video"){
   const overlay = document.getElementById("videoFullscreenOverlay");
   const video = document.getElementById("fullscreenVideo");

   video.querySelector("source").src = item.src;
   video.load();

   overlay.style.display = "flex";
   return;
 }

 document.getElementById("fullscreenImage").src = item.src;
 document.getElementById("fullscreenOverlay").style.display = "flex";
}
  
function closeFullscreen(){
 document.getElementById("fullscreenOverlay").style.display = "none";
 document.getElementById("menuBtn").style.display = "block";
}

function closeVideoFullscreen(){
 const video = document.getElementById("fullscreenVideo");
 video.pause();

 document.getElementById("videoFullscreenOverlay").style.display = "none";
 document.getElementById("menuBtn").style.display = "block";
}
</script>

<script type="module"
src="./public.js">
</script>
<script>
const menuBtn = document.getElementById("menuBtn");
const menuPopup = document.getElementById("menuPopup");
let lastScrollY = window.scrollY;
let ticking = false;

function updateMenuBtn() {
  const currentScrollY = window.scrollY;

  if (currentScrollY <= 10) {
    menuBtn.classList.remove("hide-on-scroll");
  } else if (currentScrollY > lastScrollY) {
    menuBtn.classList.add("hide-on-scroll");
    menuPopup.style.display = "none";
  } else {
    menuBtn.classList.remove("hide-on-scroll");
  }

  lastScrollY = currentScrollY;
  ticking = false;
}

window.addEventListener("scroll", () => {
  if (!ticking) {
    window.requestAnimationFrame(updateMenuBtn);
    ticking = true;
  }
}, { passive: true });

menuBtn.onclick = () => {
  menuPopup.style.display =
    menuPopup.style.display === "block" ? "none" : "block";
};

function openAdmin() {
  location.href = "login.html";
}

document.addEventListener("click", e => {
  if (!menuBtn.contains(e.target) && !menuPopup.contains(e.target)) {
    menuPopup.style.display = "none";
  }
});
</script>
  <script>

window.addEventListener(

  deferredPrompt = e;

  const btn =

  if(btn){
   btn.style.display = "block";
  }

 });

document
.getElementById("installBtn")
?.addEventListener("click", async () => {

 if(!deferredPrompt){

  );

 }

 deferredPrompt.prompt();

 const result =
 await deferredPrompt.userChoice;

 console.log(result.outcome);

 deferredPrompt = null;

 .getElementById("installBtn")
 .style.display = "none";

});
</script>
