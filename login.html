<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login Admin</title>

<style>

body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f5f5;
}

.box{
background:white;
padding:20px;
border-radius:12px;
width:300px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:10px;
background:#ee4d2d;
color:white;
border:none;
border-radius:8px;
}

</style>
</head>
<body>

<div class="box">

<h2>Login Admin</h2>

<input
id="email"
type="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button id="loginBtn">
Login
</button>

</div>

<script type="module"
src="login.js"></script>

</body>
</html>
